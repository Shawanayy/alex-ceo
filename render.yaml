# Render deployment blueprint for Alex's remote MCP server (src/remoteMcpServer.js).
# This is what makes Alex reachable from Cowork (Cowork requires a public HTTPS MCP endpoint,
# not a local stdio process). Deploy via Render's "New +" -> "Blueprint" and point it at this repo,
# or create the service manually in the dashboard using these same settings.
#
# All secrets below are marked `sync: false`, meaning Render will NOT read them from this file —
# you paste the real values into the Render dashboard yourself after the service is created.
# Nothing secret ever gets committed to git.

services:
  - type: web
    name: alex-ceo-mcp
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/remoteMcpServer.js
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALEX_MODEL
        value: claude-sonnet-5
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEFAULT_USER_ID
        sync: false
      - key: CANVAS_ICS_URL
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: ALEX_REMOTE_MCP_TOKEN
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false

  # Render deployment for the actual Telegram bot (src/index.js), so Alex stays reachable on
  # Telegram 24/7 with no laptop involved. Runs in webhook mode (USE_WEBHOOK=true) rather than
  # long polling — free-tier Render sleeps the service after inactivity, and webhook mode tolerates
  # that fine (Telegram just retries delivery until the service wakes back up), whereas long polling
  # would need to hold an open connection the whole time.
  #
  # After this service is live, register the webhook so Telegram knows to push updates here instead
  # of waiting for polling:
  #   curl "https://api.telegram.org/bot<TELEGRAM_BOT_TOKEN>/setWebhook?url=https://<this-service>.onrender.com/telegram/<TELEGRAM_BOT_TOKEN>"
  - type: web
    name: alex-ceo-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: USE_WEBHOOK
        value: 'true'
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OWNER_TELEGRAM_USER_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALEX_MODEL
        value: claude-sonnet-5
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEFAULT_USER_ID
        sync: false
      - key: CANVAS_ICS_URL
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
